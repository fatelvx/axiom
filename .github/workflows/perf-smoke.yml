name: Performance Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  synthetic-smoke:
    name: Synthetic scan smoke on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Run 2k synthetic smoke
        run: node scripts/perf-smoke.mjs --json | tee perf-smoke-2k.json

      - name: Run 10k synthetic smoke
        run: node scripts/perf-smoke.mjs --modules 100 --files-per-module 100 --cross-imports-per-file 2 --json | tee perf-smoke-10k.json

      - name: Upload performance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: axiom-performance-smoke
          path: |
            perf-smoke-2k.json
            perf-smoke-10k.json
