name: Publish Alpha

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish alpha package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate alpha version
        run: |
          node -e "const { version } = require('./package.json'); if (!version.includes('alpha')) { console.error(`Refusing to publish non-alpha version ${version} from alpha workflow.`); process.exit(1); } console.log(`Publishing alpha candidate ${version}`);"

      - name: Verify version is not already published
        run: |
          PACKAGE="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PACKAGE}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE}@${VERSION} is already published."
            exit 1
          fi

      - name: Run alpha release gate
        run: npm run alpha:check

      - name: Publish alpha
        run: npm publish --access public --tag alpha --ignore-scripts
