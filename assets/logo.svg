<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Axiom logo</title>
  <desc id="desc">A minimal circular Axiom mark with an abstract A, an observability ring, and a small drift signal.</desc>
  <defs>
    <linearGradient id="shell" x1="38" y1="28" x2="218" y2="228" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1B1F"/>
      <stop offset="1" stop-color="#071014"/>
    </linearGradient>
    <linearGradient id="aStroke" x1="74" y1="183" x2="181" y2="68" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8BFFD8"/>
      <stop offset="0.52" stop-color="#5CF4F0"/>
      <stop offset="1" stop-color="#3AD7FF"/>
    </linearGradient>
    <linearGradient id="ring" x1="46" y1="46" x2="210" y2="214" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8BFFD8"/>
      <stop offset="0.55" stop-color="#3AD7FF"/>
      <stop offset="1" stop-color="#7FA2FF"/>
    </linearGradient>
    <linearGradient id="drift" x1="98" y1="86" x2="157" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD166"/>
      <stop offset="1" stop-color="#FF5F7E"/>
    </linearGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.29 0 0 0 0 0.95 0 0 0 0 0.88 0 0 0 0.34 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <circle cx="128" cy="128" r="118" fill="url(#shell)"/>
  <circle cx="128" cy="128" r="116" stroke="#1E4049" stroke-width="2"/>
  <circle cx="128" cy="128" r="92" stroke="#234B55" stroke-width="2" opacity="0.62"/>
  <circle cx="128" cy="128" r="72" stroke="url(#ring)" stroke-width="3.4"/>
  <path d="M67 128A61 61 0 0 1 128 67" stroke="#8BFFD8" stroke-width="3.2" stroke-linecap="round" opacity="0.72"/>
  <path d="M189 128A61 61 0 0 1 128 189" stroke="#7FA2FF" stroke-width="3.2" stroke-linecap="round" opacity="0.72"/>

  <path d="M104 96L148 145" stroke="url(#drift)" stroke-width="5.6" stroke-linecap="round" opacity="0.86"/>
  <circle cx="148" cy="145" r="5" fill="#FF5F7E"/>

  <path d="M82 180L119 75C122 67 134 67 137 75L174 180" stroke="url(#aStroke)" stroke-width="12.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M104 143H152" stroke="#EFFFFA" stroke-width="8.5" stroke-linecap="round"/>
  <path d="M104 143H152" stroke="#8BFFD8" stroke-width="3.2" stroke-linecap="round"/>

  <circle cx="128" cy="128" r="117" stroke="url(#ring)" stroke-width="2.5" opacity="0.7"/>
</svg>
